<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Dashboard - AssignGuard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-header h1 {
            color: var(--success);
        }

        .event-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
        }

        .event-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-time {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .register-form {
            background: rgba(0, 0, 0, 0.2);
            padding: 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .input-row>div {
            flex: 1;
        }

        .event-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }

        .event-input:focus {
            border-color: var(--success);
        }

        .btn-event {
            background: rgba(76, 175, 140, 0.15);
            color: var(--success);
            border: 1px solid rgba(76, 175, 140, 0.3);
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-event:hover {
            background: rgba(76, 175, 140, 0.25);
        }

        .btn-del {
            background: rgba(255, 80, 80, 0.1);
            color: #ff6060;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <header class="navbar" style="border-bottom-color: rgba(76,175,140,0.25);">
        <a href="index.html" class="logo">Assign<span>Guard</span></a>
        <nav>
            <span style="color: var(--text-muted); font-size:0.88rem; margin-right:8px;">📅 Organizer</span>
            <a href="#" id="logoutBtn" style="color:var(--success);">Logout</a>
        </nav>
    </header>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <h1>📅 Event Organizer Dashboard</h1>
            <p>Create new events and register student attendees.</p>
        </div>

        <!-- Create Event Card -->
        <div class="card" style="margin-bottom: 30px; border-top: 3px solid var(--success);">
            <h3><span class="icon">➕</span> Create New Event</h3>
            <div style="display: flex; gap: 12px; align-items: flex-end; margin-top: 16px;">
                <div style="flex: 1;">
                    <label
                        style="display:block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted);">Event
                        Name</label>
                    <input type="text" id="newEventName" placeholder="e.g. DBMS Hackathon" class="event-input">
                </div>
                <div>
                    <label
                        style="display:block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted);">Start
                        Date & Time</label>
                    <input type="datetime-local" id="newEventTime" class="event-input" style="width: 200px;">
                </div>
                <div>
                    <label style="display:block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-muted);">End
                        Date & Time</label>
                    <input type="datetime-local" id="newEventEndTime" class="event-input" style="width: 200px;">
                </div>
                <button class="btn btn-primary" onclick="createEvent()"
                    style="height: 40px; padding: 0 20px; background:var(--success);">Create</button>
            </div>
        </div>

        <div id="eventsList">
            <div class="loading-spinner-center">Loading events...</div>
        </div>

    </main>

    <script>
        const orgToken = localStorage.getItem('orgToken');
        if (!orgToken) window.location.href = 'event-login.html';

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('orgToken');
            window.location.href = 'event-login.html';
        });

        async function apiFetch(url, options = {}) {
            options.headers = { ...options.headers, 'Authorization': `Bearer ${orgToken}` };
            const res = await fetch(url, options);
            if (res.status === 401 || res.status === 403) {
                localStorage.removeItem('orgToken'); window.location.href = 'event-login.html';
            }
            const data = await res.json();
            return { ok: res.ok, data };
        }

        async function createEvent() {
            console.log("Create button clicked");

            const name = document.getElementById('newEventName').value.trim();
            let event_time = document.getElementById('newEventTime').value;
            let end_time = document.getElementById('newEventEndTime').value;

            if (!name || !event_time || !end_time) {
                alert('Fill all fields');
                return;
            }

            // Format datetime
            if (event_time.length === 16) event_time += ':00';
            if (end_time.length === 16) end_time += ':00';

            event_time = event_time.replace('T', ' ');
            end_time = end_time.replace('T', ' ');

            try {
                const res = await fetch('http://localhost:3000/api/events', {  // ✅ FIXED URL
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('orgToken')}`
                    },
                    body: JSON.stringify({ name, event_time, end_time })
                });

                const data = await res.json();
                console.log(data);

                if (res.ok) {
                    alert('✅ Event created successfully!');

                    // Clear fields
                    document.getElementById('newEventName').value = '';
                    document.getElementById('newEventTime').value = '';
                    document.getElementById('newEventEndTime').value = '';

                    loadEvents(); // refresh list
                } else {
                    alert('❌ ' + (data.error || 'Server error'));
                }

            } catch (err) {
                console.error(err);
                alert('❌ Cannot connect to backend server');
            }
        }


        async function deleteEvent(id) {
            if (!confirm('Are you sure you want to delete this event?')) return;
            const { ok } = await apiFetch(`/api/events/${id}`, { method: 'DELETE' });
            if (ok) loadEvents();
        }

        async function loadEvents() {
            const container = document.getElementById('eventsList');
            const { ok, data } = await apiFetch('/api/events');

            if (!ok || !data.events || data.events.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted);text-align:center;">No events created yet.</p>';
                return;
            }

            let html = '';
            for (const e of data.events) {
                const startTime = new Date(e.event_time).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
                const endTime = e.end_time ? new Date(e.end_time).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' }) : 'TBD';

                html += `
            <div class="event-card">
                <div class="event-title">
                    ${e.name}
                    <button class="btn-del" onclick="deleteEvent(${e.id})">🗑️ Delete Event</button>
                </div>
                <div class="event-time">
                    🕒 <strong>Start:</strong> ${startTime} &nbsp;—&nbsp; <strong>End:</strong> ${endTime} 
                    &nbsp;&nbsp; | &nbsp;&nbsp; 👥 ${e.attendeeCount} attendees
                </div>
                
                <div style="display:flex; gap:24px; margin-top:20px;">
                    <!-- Add Student Form -->
                    <div class="register-form" style="flex:1; margin-bottom:0; height:fit-content;">
                        <p style="font-size: 0.95rem; color: var(--text); margin-bottom: 16px; font-weight: 700;">➕ Add Student to List</p>
                        <div style="margin-bottom: 12px;">
                            <label style="display:block; margin-bottom:4px; font-size:0.8rem; color:var(--text-muted)">Roll Number</label>
                            <input type="text" id="roll-${e.id}" class="event-input" placeholder="e.g. 101" required>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="display:block; margin-bottom:4px; font-size:0.8rem; color:var(--text-muted)">Full Name</label>
                            <input type="text" id="name-${e.id}" class="event-input" placeholder="e.g. John Doe" required>
                        </div>
                        <div style="margin-bottom: 16px;">
                            <label style="display:block; margin-bottom:4px; font-size:0.8rem; color:var(--text-muted)">Branch</label>
                            <input type="text" id="branch-${e.id}" class="event-input" placeholder="e.g. CSE" required>
                        </div>
                        <button class="btn-event" onclick="addStudent(${e.id})" id="btn-${e.id}">✅ Add to List</button>
                        <div id="msg-${e.id}" style="margin-top: 12px; font-size: 0.85rem; display: none;"></div>
                    </div>

                    <!-- Student List -->
                    <div style="flex:2; background:rgba(0,0,0,0.1); border:1px solid var(--card-border); border-radius:var(--radius-sm); padding:16px;">
                        <p style="font-size: 0.95rem; color: var(--text); margin-bottom: 16px; font-weight: 700;">📋 Current Student List</p>
                        <div class="attendee-list" id="attendees-${e.id}">
                            <span style="color:var(--text-muted);font-size:0.85rem;">Loading list...</span>
                        </div>
                    </div>
                </div>
            </div>`;
            }
            container.innerHTML = html;

            // Load the attendees list for each event immediately
            for (const e of data.events) {
                loadAttendees(e.id);
            }
        }

        async function addStudent(eventId) {
            const roll_no = document.getElementById(`roll-${eventId}`).value.trim();
            const student_name = document.getElementById(`name-${eventId}`).value.trim();
            const branch = document.getElementById(`branch-${eventId}`).value.trim();
            const msgDiv = document.getElementById(`msg-${eventId}`);
            const btn = document.getElementById(`btn-${eventId}`);

            msgDiv.style.display = 'none';
            if (!roll_no || !student_name || !branch) {
                msgDiv.textContent = '❌ Please fill all fields.'; msgDiv.style.color = '#ff6060'; msgDiv.style.display = 'block';
                return;
            }

            btn.disabled = true;
            const { ok, data } = await apiFetch(`/api/events/${eventId}/attendees`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roll_no, student_name, branch })
            });

            msgDiv.style.display = 'block';
            if (ok) {
                msgDiv.textContent = `✅ ${data.message}`; msgDiv.style.color = 'var(--success)';
                document.getElementById(`roll-${eventId}`).value = '';
                document.getElementById(`name-${eventId}`).value = '';
                document.getElementById(`branch-${eventId}`).value = '';

                // Refresh ONLY this event's attendee list so it feels instantaneous
                loadAttendees(eventId);
                setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
            } else {
                msgDiv.textContent = `❌ ${data.error}`; msgDiv.style.color = '#ff6060';
            }
            btn.disabled = false;
        }

        async function loadAttendees(eventId) {
            const listDiv = document.getElementById(`attendees-${eventId}`);
            const { ok, data } = await apiFetch(`/api/events/${eventId}/attendees`);

            if (ok) {
                if (data.attendees.length === 0) {
                    listDiv.innerHTML = '<span style="color:var(--text-muted);font-size:0.85rem;">No students in the list yet. Add them using the form.</span>';
                    return;
                }
                let html = `<table class="submissions-table" style="margin-top:0;">
                <thead><tr><th>Roll No</th><th>Name</th><th>Branch</th></tr></thead><tbody>`;
                data.attendees.forEach(a => {
                    html += `<tr><td>${a.roll_no}</td><td>${a.student_name}</td><td>${a.branch}</td></tr>`;
                });
                html += `</tbody></table>`;
                listDiv.innerHTML = html;
            } else {
                listDiv.innerHTML = '<span style="color:#ff6060;font-size:0.85rem;">Failed to load list.</span>';
            }
        }

        loadEvents();
    </script>

</body>

</html>
