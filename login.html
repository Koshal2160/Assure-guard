<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AssignGuard</title>
    <meta name="description" content="Login to AssignGuard to submit and check your assignments.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <a href="index.html" class="logo">Assign<span>Guard</span></a>
    <nav>
        <a href="login.html" class="active">Login</a>
        <a href="register.html">Register</a>
    </nav>
</header>

<main class="auth-container">
    <div class="auth-card">
        <h2>Welcome back 👋</h2>
        <p class="subtitle">Enter your credentials to access your account</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                <span class="spinner"></span>
                <span class="btn-text">Sign In</span>
            </button>
        </form>

        <div class="alert alert-success" id="successAlert">✅ Login successful! Redirecting...</div>
        <div class="alert alert-error" id="errorAlert">❌ <span id="errorMsg">Invalid credentials</span></div>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>
</main>

<script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const successAlert = document.getElementById('successAlert');
        const errorAlert = document.getElementById('errorAlert');

        btn.classList.add('loading');
        successAlert.classList.remove('show');
        errorAlert.classList.remove('show');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok) {
                localStorage.setItem('token', data.token);
                successAlert.classList.add('show');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
            } else {
                document.getElementById('errorMsg').textContent = data.error || 'Login failed';
                errorAlert.classList.add('show');
            }
        } catch (err) {
            document.getElementById('errorMsg').textContent = 'Cannot connect to server. Is the server running?';
            errorAlert.classList.add('show');
        } finally {
            btn.classList.remove('loading');
        }
    });
</script>

</body>
</html>
